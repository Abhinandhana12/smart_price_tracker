<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Price Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #f8fafc;
    --border: #e2e8f0;
    --accent: #0ea5e9;
    --accent2: #0284c7;
    --danger: #ef4444;
    --warn: #f59e0b;
    --text: #1e293b;
    --muted: #94a3b8;
    --card-shadow: 0 0 0 1px var(--border), 0 4px 20px rgba(0,0,0,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; }

  /* ── HEADER ── */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:24px 40px; border-bottom:1px solid var(--border);
    background: linear-gradient(90deg, #ffffff 0%, #f0f9ff 100%);
    position:sticky; top:0; z-index:100; backdrop-filter:blur(8px);
  }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-icon {
    width:36px; height:36px; border-radius:10px;
    background: conic-gradient(var(--accent), #00c96b, #00ff87);
    display:flex; align-items:center; justify-content:center; font-size:18px;
  }
  .logo h1 { font-size:1.3rem; font-weight:800; letter-spacing:-0.5px; }
  .logo span { color:var(--accent); }
  .header-stats { display:flex; gap:24px; }
  .stat { text-align:center; }
  .stat-num { font-family:'Space Mono',monospace; font-size:1.4rem; color:var(--accent); font-weight:700; }
  .stat-label { font-size:0.7rem; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }

  /* ── LAYOUT ── */
  .main { max-width:1300px; margin:0 auto; padding:40px; }
  .grid { display:grid; grid-template-columns:380px 1fr; gap:32px; }

  /* ── FORM CARD ── */
  .card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:28px; box-shadow:var(--card-shadow);
  }
  .card-title {
    font-size:0.75rem; font-weight:600; letter-spacing:2px;
    text-transform:uppercase; color:var(--accent); margin-bottom:20px;
  }
  .form-group { margin-bottom:16px; }
  label { display:block; font-size:0.8rem; color:var(--muted); margin-bottom:6px; letter-spacing:0.5px; }
  input {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:8px; padding:11px 14px; color:var(--text);
    font-family:'Syne',sans-serif; font-size:0.9rem; outline:none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,255,135,0.08); }
  input::placeholder { color:var(--muted); }

  .btn-primary {
    width:100%; padding:13px; background:var(--accent); color:#0a0f0d;
    border:none; border-radius:8px; font-family:'Syne',sans-serif;
    font-weight:700; font-size:0.95rem; cursor:pointer; letter-spacing:0.5px;
    transition:all 0.2s; margin-top:4px;
  }
  .btn-primary:hover { background:var(--accent2); transform:translateY(-1px); }
  .btn-primary:active { transform:translateY(0); }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

  /* ── PRODUCT TABLE ── */
  .products-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .products-header h2 { font-size:1rem; font-weight:600; }
  .refresh-all {
    font-size:0.8rem; color:var(--accent); background:none; border:1px solid var(--border);
    border-radius:6px; padding:6px 12px; cursor:pointer; font-family:'Syne',sans-serif;
    transition:all 0.2s;
  }
  .refresh-all:hover { border-color:var(--accent); }

  .product-grid { display:flex; flex-direction:column; gap:12px; }
  .product-card {
    background:var(--surface2); border:1px solid var(--border); border-radius:12px;
    padding:18px 20px; display:grid;
    grid-template-columns:1fr auto auto auto auto; align-items:center; gap:16px;
    transition:border-color 0.2s;
  }
  .product-card:hover { border-color:rgba(14,165,233,0.3); }
  .product-card.dropped { border-color:rgba(14,165,233,0.4); background:rgba(14,165,233,0.03); }

  .product-name { font-weight:600; font-size:0.95rem; margin-bottom:3px; }
  .product-email { font-size:0.75rem; color:var(--muted); }

  .price-col { text-align:right; }
  .price-current { font-family:'Space Mono',monospace; font-size:1.05rem; font-weight:700; }
  .price-label { font-size:0.68rem; color:var(--muted); letter-spacing:0.5px; margin-top:1px; }
  .price-target { font-family:'Space Mono',monospace; font-size:0.9rem; color:var(--muted); }

  .badge {
    padding:4px 10px; border-radius:20px; font-size:0.72rem; font-weight:700;
    letter-spacing:0.5px; text-transform:uppercase; white-space:nowrap;
  }
  .badge-dropped { background:rgba(14,165,233,0.1); color:#0284c7; border:1px solid rgba(14,165,233,0.3); }
  .badge-waiting { background:rgba(245,158,11,0.1); color:#d97706; border:1px solid rgba(245,158,11,0.2); }

  .actions { display:flex; gap:6px; }
  .btn-icon {
    width:32px; height:32px; border-radius:7px; border:1px solid var(--border);
    background:none; cursor:pointer; font-size:14px; display:flex;
    align-items:center; justify-content:center; transition:all 0.2s; color:var(--text);
  }
  .btn-icon:hover { border-color:var(--accent); color:var(--accent); }
  .btn-icon.delete:hover { border-color:var(--danger); color:var(--danger); }

  /* ── MODAL ── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);
    display:none; align-items:center; justify-content:center; z-index:1000;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:32px; width:600px; max-width:95vw; max-height:90vh; overflow:auto;
  }
  .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
  .modal-title { font-size:1.1rem; font-weight:700; }
  .modal-close { background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; }

  .chart-container { position:relative; height:200px; margin-bottom:20px; }
  .predict-box {
    background:var(--surface2); border:1px solid rgba(14,165,233,0.2);
    border-radius:10px; padding:16px; text-align:center; margin-top:12px;
  }
  .predict-price { font-family:'Space Mono',monospace; font-size:1.5rem; color:var(--accent); font-weight:700; }
  .predict-label { font-size:0.78rem; color:var(--muted); margin-top:4px; }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:32px; right:32px; background:var(--surface);
    border:1px solid var(--border); border-radius:12px; padding:14px 20px;
    font-size:0.88rem; z-index:9999; transform:translateY(100px); opacity:0;
    transition:all 0.3s; max-width:300px;
  }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.success { border-color:var(--accent); color:var(--accent); }
  .toast.error { border-color:var(--danger); color:var(--danger); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align:center; padding:60px 20px; color:var(--muted);
  }
  .empty-icon { font-size:3rem; margin-bottom:12px; }
  .empty-state p { font-size:0.9rem; }

  /* ── LOADING ── */
  .spinner {
    display:inline-block; width:16px; height:16px; border:2px solid rgba(0,0,0,0.3);
    border-top-color:#ffffff; border-radius:50%; animation:spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  @media (max-width:900px) {
    .grid { grid-template-columns:1fr; }
    .header-stats { display:none; }
    .main { padding:20px; }
    header { padding:16px 20px; }
    .product-card { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📈</div>
    <h1>Smart<span>Price</span>Tracker</h1>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Tracking</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-dropped">0</div>
      <div class="stat-label">Dropped</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-waiting">0</div>
      <div class="stat-label">Waiting</div>
    </div>
  </div>
</header>

<div class="main">
  <div class="grid">

    <!-- FORM -->
    <div>
      <div class="card">
        <div class="card-title">Track New Product</div>
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="f-name" placeholder="e.g. iPhone 15 Pro Max"/>
        </div>
        <div class="form-group">
          <label>Product URL (Amazon / Flipkart)</label>
          <input type="url" id="f-url" placeholder="https://www.amazon.in/..."/>
        </div>
        <div class="form-group">
          <label>Target Price (₹)</label>
          <input type="number" id="f-target" placeholder="e.g. 75000" min="1"/>
        </div>
        <div class="form-group">
          <label>Alert Email</label>
          <input type="email" id="f-email" placeholder="you@example.com"/>
        </div>
        <button class="btn-primary" id="add-btn" onclick="addProduct()">
          Start Tracking
        </button>
      </div>

      
    </div>

    <!-- PRODUCT LIST -->
    <div>
      <div class="products-header">
        <h2>Tracked Products</h2>
        <button class="refresh-all" onclick="loadProducts()">↻ Refresh All</button>
      </div>
      <div class="product-grid" id="product-list">
        <div class="empty-state">
          <div class="empty-icon">📦</div>
          <p>No products tracked yet.<br>Add one to get started!</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Price History</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="chart-container">
      <canvas id="price-chart"></canvas>
    </div>
    <div class="predict-box" id="predict-box" style="display:none">
      <div class="predict-label">🤖 AI Price Prediction (Next Check)</div>
      <div class="predict-price" id="predict-value">—</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let chart = null;

async function api(method, path, body) {
  const opts = { method, headers:{'Content-Type':'application/json'} };
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch('/api' + path, opts);
  return res.json();
}

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 3000);
}

async function loadProducts() {
  const data = await api('GET', '/products');
  const list = document.getElementById('product-list');
  const total = data.length;
  const dropped = data.filter(p => p.current_price <= p.target_price).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-dropped').textContent = dropped;
  document.getElementById('stat-waiting').textContent = total - dropped;

  if(!total) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><p>No products tracked yet.<br>Add one to get started!</p></div>`;
    return;
  }

  list.innerHTML = data.map(p => {
    const dropped = p.current_price <= p.target_price;
    const badge = dropped
      ? `<span class="badge badge-dropped">✓ Dropped</span>`
      : `<span class="badge badge-waiting">⏳ Waiting</span>`;
    return `
    <div class="product-card ${dropped ? 'dropped' : ''}" id="pc-${p.id}">
      <div>
        <div class="product-name">${p.name}</div>
        <div class="product-email">${p.email}</div>
      </div>
      <div class="price-col">
        <div class="price-current">₹${p.current_price?.toLocaleString('en-IN') ?? '—'}</div>
        <div class="price-label">Current</div>
      </div>
      <div class="price-col">
        <div class="price-target">₹${p.target_price?.toLocaleString('en-IN')}</div>
        <div class="price-label">Target</div>
      </div>
      ${badge}
      <div class="actions">
        <button class="btn-icon" title="View History" onclick="openHistory(${p.id}, '${p.name}')">📊</button>
        <button class="btn-icon" title="Refresh Price" onclick="refreshProduct(${p.id})">↻</button>
        <button class="btn-icon delete" title="Delete" onclick="deleteProduct(${p.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

async function addProduct() {
  const btn = document.getElementById('add-btn');
  const name = document.getElementById('f-name').value.trim();
  const url  = document.getElementById('f-url').value.trim();
  const target = document.getElementById('f-target').value.trim();
  const email = document.getElementById('f-email').value.trim();

  if(!name || !url || !target || !email) { toast('Please fill all fields', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const res = await api('POST', '/products', {name, url, target_price: parseFloat(target), email});
  btn.disabled = false;
  btn.textContent = 'Start Tracking';

  if(res.error) { toast(res.error, 'error'); return; }

  ['f-name','f-url','f-target','f-email'].forEach(id => document.getElementById(id).value = '');
  toast(`✓ Tracking ${name} at ₹${res.current_price?.toLocaleString('en-IN')}`);
  loadProducts();
}

async function refreshProduct(id) {
  const res = await api('POST', `/refresh/${id}`);
  if(res.error) { toast(res.error, 'error'); return; }
  toast(`✓ Refreshed — ₹${res.current_price?.toLocaleString('en-IN')}`);
  loadProducts();
}

async function deleteProduct(id) {
  if(!confirm('Remove this product from tracking?')) return;
  await api('DELETE', `/products/${id}`);
  toast('Product removed');
  loadProducts();
}

async function openHistory(id, name) {
  const [history, prediction] = await Promise.all([
    api('GET', `/history/${id}`),
    api('GET', `/predict/${id}`)
  ]);

  document.getElementById('modal-title').textContent = `📊 ${name}`;
  document.getElementById('modal').classList.add('open');

  const labels = history.map(h => new Date(h.recorded_at).toLocaleDateString('en-IN', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}));
  const prices = history.map(h => h.price);

  if(chart) chart.destroy();
  const ctx = document.getElementById('price-chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Price (₹)',
        data: prices,
        borderColor: '#0ea5e9',
        backgroundColor: 'rgba(14,165,233,0.08)',
        tension: 0.4,
        pointBackgroundColor: '#0ea5e9',
        pointRadius: 4,
        fill: true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color:'#94a3b8', font:{size:10} }, grid: { color:'#e2e8f0' } },
        y: { ticks: { color:'#94a3b8', callback: v => '₹'+v.toLocaleString('en-IN') }, grid: { color:'#e2e8f0' } }
      }
    }
  });

  const pb = document.getElementById('predict-box');
  if(prediction.predicted_price) {
    document.getElementById('predict-value').textContent = '₹' + prediction.predicted_price.toLocaleString('en-IN');
    pb.style.display = 'block';
  } else {
    pb.style.display = 'none';
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click', e => {
  if(e.target === e.currentTarget) closeModal();
});

loadProducts();
setInterval(loadProducts, 60000);
</script>
</body>
</html>
